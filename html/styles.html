<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment:    #f5eedc;
    --ink:          #2a1f0e;
    --faded-ink:    #5c4a2a;
    --command-bg:   #1e1a14;
    --command-text: #c8b87a;
    --prompt:       #7a6030;
    --rule-color:   #9c7c3a;
    --quote-border: #8b6914;
    --room-color:   #5a1a00;
    --red: #8b1a1a;
    --border: #b8a070;
    --shadow:       rgba(42,31,14,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background-color: var(--parchment);
  }
  body {
    font-family: Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 1rem 0 2em 0;
    line-height: 1.5;
  }

  /* Header */
  .transcript-header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--rule-color);
  }
  h1, h2, h3 {
    font-family: 'Cinzel', serif;
    color: var(--room-color);
    text-transform: uppercase;
    font-weight: 600;

  }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.08em;
    text-align: center;
  }
  .transcript-header p {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--faded-ink);
    margin-top: 0.4rem;
  }

  /* Normal prose paragraphs */
  p {
    color: var(--ink);
    margin-bottom: 0.9rem;
    /* text-align: justify; */
    hyphens: auto;
  }

  /* Section headers (from * comments) */
  h2 {
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid rgba(156,124,58,0.5);
    text-align: center;
  }

  /* Room headers */
  h3 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--room-color);
    margin: 1.8rem 0 0.6rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(156,124,58,0.35);
  }

  /* Commands */
  .command {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    background: var(--command-bg);
    color: var(--command-text);
    padding: 0.55rem 1rem;
    margin: 1.4rem -1rem;
    border-left: 3px solid var(--prompt);
    letter-spacing: 0.05em;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .command .prompt {
    color: var(--prompt);
    margin-right: 0.4em;
    font-weight: 400;
  }

  /* Blockquotes (epigraphs, in-game quotes) */
  blockquote {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 1.2rem;
    line-height: 1.8;
    color: var(--faded-ink);
    margin: 1.8rem 0 1.8rem 2rem;
    padding: 0.5rem 0 0.5rem 1.5rem;
    border-left: 2px solid var(--quote-border);
  }

  /* Preformatted in-game text (schedules, carvings, etc.) */
  pre.game-pre {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--faded-ink);
    margin: 0.8rem 0 0.8rem 1.5rem;
    white-space: pre;
    background: none;
    border: none;
  }

  /* Story break rule */
  hr.story-break {
    border: none;
    margin: 2.5rem auto;
    width: 60%;
    position: relative;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--rule-color), transparent);
  }
  hr.story-break::before {
    content: '✦';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--parchment);
    color: var(--rule-color);
    padding: 0 0.6rem;
    font-size: 0.75rem;
  }

  .download-btn {
    display: inline-block;
    margin: 0.5em 0.8em 0.5em 0;
    padding: 0.35rem 1rem;
    background: var(--red);
    color: var(--parchment) !important;
    border: none;
    font-size: 1.1rem;
    box-shadow: 0 2px 6px var(--shadow);
    text-decoration: none;
  }
  .download-btn:hover {
    background: #6e1414;
    box-shadow: 0 3px 10px var(--shadow);
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .command { margin: 1.2rem -0.5rem; }
  }
</style>
